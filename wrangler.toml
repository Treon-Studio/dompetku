name = "expense-fyi"
main = "build/server/index.js"
compatibility_date = "2024-01-01"

[site]
bucket = "./build/client"

[vars]
NODE_ENV = "production"

[[d1_databases]]
binding = "DB"
database_name = "expense-fyi"
database_id = "your-database-id-here"

[ai]
binding = "AI"

[[kv_namespaces]]
binding = "CACHE"
id = "your-kv-namespace-id-here"